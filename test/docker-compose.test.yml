# E2E test stack: postgres -> backend -> frontend -> playwright
# Usage: docker compose -f test/docker-compose.test.yml up --build --abort-on-container-exit

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gastown_fin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/gastown_fin
      LLM_MOCK: "true"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  frontend:
    build:
      context: ../frontend
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  playwright:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    environment:
      BASE_URL: http://frontend:3000
      API_URL: http://backend:8000
    depends_on:
      frontend:
        condition: service_healthy
    volumes:
      - ./results:/app/results
